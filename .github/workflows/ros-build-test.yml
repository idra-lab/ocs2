name: Build and Test OCS2

on:
  push:
    branches: [ ubuntu24-ci ]
  pull_request:
    branches: [ ros-one-devel ]
  workflow_dispatch:

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        build_type: [ Release ]

    # environment: regular Ubuntu with a vanilla ROS container
    runs-on: ubuntu-24.04

    steps:
    - name: Environment Info
      run: |
        pwd
        uname -r
        lsb_release -a

    - name: System deps
      run: |
        apt-get update
        apt-get install -y git ninja-build liburdfdom-dev liboctomap-dev libassimp-dev checkinstall wget rsync curl

    - name: ROS One installation
      run: |
        curl -sSL https://ros.packages.techfak.net/gpg.key -o /etc/apt/keyrings/ros-one-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/ros-one-keyring.gpg] https://ros.packages.techfak.net $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/ros1.list
        apt update
        apt install python3-rosdep
        rosdep init
        echo "yaml https://ros.packages.techfak.net/ros-one.yaml one" | sudo tee /etc/ros/rosdep/sources.list.d/1-ros-one.list
        rosdep update
        apt install ros-one-desktop

    - name: Pinocchio from robotpkg
      run: |
        curl http://robotpkg.openrobots.org/packages/debian/robotpkg.asc | sudo tee /etc/apt/keyrings/robotpkg.asc
        echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/robotpkg.asc] http://robotpkg.openrobots.org/packages/debian/pub $(lsb_release -cs) robotpkg" | sudo tee /etc/apt/sources.list.d/robotpkg.list
        apt update
        apt install robotpkg-312-coal robotpkg-312-pinocchio
        export CMAKE_PREFIX_PATH=/opt/openrobots:${CMAKE_PREFIX_PATH}
        export LD_LIBRARY_PATH=/opt/openrobots/lib:${LD_LIBRARY_PATH}

    - uses: actions/checkout@v4
      with: 
        ref: ros-one-devel
        path: src/ocs2 

    - name: Rosdep
      run: |
        rosdep update
        rosdep install --from-paths src --ignore-src -r -y

    - name: Checkout dependencies
      run: |
        git clone https://github.com/leggedrobotics/ocs2_robotic_assets.git src/ocs2_robotic_assets
        
    # - name: Install RaiSim
    #   run: |
    #     git clone --depth 1 https://github.com/raisimTech/raisimLib.git -b v1.1.01 src/raisim_tech
    #     cd src/raisim_tech
    #     mkdir build
    #     cd build
    #     cmake .. -DPYTHON_EXECUTABLE=$(python3 -c "import sys; print(sys.executable)")
    #     make -j4 && checkinstall
        
    # - name: Install ONNX Runtime
    #   run: |
    #     wget https://github.com/microsoft/onnxruntime/releases/download/v1.7.0/onnxruntime-linux-x64-1.7.0.tgz -P tmp/microsoft
    #     tar xf tmp/microsoft/onnxruntime-linux-x64-1.7.0.tgz -C tmp/microsoft
    #     rsync -a tmp/microsoft/onnxruntime-linux-x64-1.7.0/include/ /usr/local/include/onnxruntime
    #     rsync -a tmp/microsoft/onnxruntime-linux-x64-1.7.0/lib/ /usr/local/lib
    #     rsync -a src/ocs2/ocs2_mpcnet/ocs2_mpcnet_core/misc/onnxruntime/cmake/ /usr/local/share/onnxruntime

    - name: Build (${{ matrix.build_type }})
      shell: bash
      run: |
        source /opt/ros/one/setup.bash
        catkin_make_isolated --use-ninja --merge --only-pkg-with-deps ocs2 --cmake-args -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} 
        
